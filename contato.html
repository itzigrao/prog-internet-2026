<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <h1> Work smart not hard, tell us what you need!</h1>
        <p> Entre em contato com nossos executivos abaixo</p>
    </header>
    <div class="container">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </div>
    <form class="form-contato">
        <h2> Formulário de Contato</h2>

        <label for="nome">Nome: </label>
        <input type="text" id="nome" required minlength="3" placeholder="Digite seu nome">

        <label for="email">Email: </label>
        <input type="email" id="email" >

        <label for="telefone">Telefone: </label>
        <input type="tel"  id="telefone" pattern="[0-9]{10,11}" placeholder="Somente números">

        <label for="assunto">Assunto: </label>
        <select id="assunto">
            <option value="">Selecione</option>
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="contato">Contato</option>

        </select>
        
        <label for="message">Mensagem: </label>
        <textarea id="message" rows="4" required></textarea>

        <button type="submit">Enviar</button>
        <!-- <button type="button" onclick="document.getElementById('nome').value = 'HELLO JAVA SCRIPT'">Click Me</button> -->
        <input type="submit" value="Enviar">

        <button id="btnAlerta">Exibir Alerta</button>
        <button id="btnCor">Mudar Cor</button>
        <button id="btnConteudo">Mudar conteúdo</button>
        <p id="conteudo">Conteúdo original</p>
        </button>
    </form>
    
    
    <script src="assets/js/script.js"></script>
</body>
<footer>
    <nav>
        <ul>
         <li><a href="index.html">voltar</a></li>
        </ul>
    </nav>
</footer>
</html>
